name: Update Top Languages card

on:
  schedule:
    - cron: "0 3 * * *"      # todo dia às 3h UTC
  workflow_dispatch:           # permite rodar manualmente

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Gerar gráfico de linguagens
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&layout=compact&langs_count=6&theme=default
          path: assets/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit e push do arquivo gerado
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/top-langs.svg
          git commit -m "Atualiza top-langs.svg" || exit 0
          git push
